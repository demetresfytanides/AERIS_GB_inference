hydra:
  run:
    dir: /flare/SAFS/vhat/checkpoints/p_1Bd66c
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=/flare/SAFS/vhat/checkpoints/p_1Bd66c
    - hydra.mode=RUN
    task:
    - experiment=era5-vaino
    - optimizer=adamw
    - optimizer.betas=[0.85,0.9]
    - optimizer.lr=0.0002
    - optimizer.eps=1e-8
    - optimizer.weight_decay=0.01
    - model.PP_stages=10
    - model.window_size=[30,30]
    - model.WP_Y=4
    - model.WP_X=4
    - data.gas=20
    - model.dim=1536
    - model.heads=12
    - model.head_dim=128
    - model.mlp_dim=6144
    - model.checkpoint_dir=/flare/SAFS/vhat/checkpoints/p_1Bd66c
    - model.load=true
    - model.norm=pre
    - model.attn_fn=flash
    - model.custom_decay6=true
    - data.root=/flare/SAFS/vhat/data/nonres-30x30-enchanced
    - model.zero_init_head=true
    - model.w_lat_add=0.01
    - model.sublayers=3
    - trainer.lr_rampup_kimg=20
    - trainer.total_kimg=25000
    - model.rit=false
    - model.grad_fix=true
    - model.grad_clip=true
    - model.grad_clip_max_norm=20
    - model.emb_norm=true
    - model.init_scale_test14=true
    - model.time_emb_init=0.01
    - model.head_init_std=1e-6
    - model.modulation_0_init=0.03
    - model.modulation_2_init=1e-6
    - model.diffusion=true
    - model.sigma_min=0.1
    - model.sigma_max=500
    - model.layerwise_t_emb=true
    - model.layerwise_t_emb_norm=false
    - model.layerwise_t_emb_after_mod_norm=true
    - data.data_workers=64
    - model.custom_high_wd=0.00001
    - model.token_emb_init_std=0.3
    - model.enhanced_channels3=true
  job:
    name: train
    chdir: true
    override_dirname: data.data_workers=64,data.gas=20,data.root=/flare/SAFS/vhat/data/nonres-30x30-enchanced,experiment=era5-vaino,model.PP_stages=10,model.WP_X=4,model.WP_Y=4,model.attn_fn=flash,model.checkpoint_dir=/flare/SAFS/vhat/checkpoints/p_1Bd66c,model.custom_decay6=true,model.custom_high_wd=0.00001,model.diffusion=true,model.dim=1536,model.emb_norm=true,model.enhanced_channels3=true,model.grad_clip=true,model.grad_clip_max_norm=20,model.grad_fix=true,model.head_dim=128,model.head_init_std=1e-6,model.heads=12,model.init_scale_test14=true,model.layerwise_t_emb=true,model.layerwise_t_emb_after_mod_norm=true,model.layerwise_t_emb_norm=false,model.load=true,model.mlp_dim=6144,model.modulation_0_init=0.03,model.modulation_2_init=1e-6,model.norm=pre,model.rit=false,model.sigma_max=500,model.sigma_min=0.1,model.sublayers=3,model.time_emb_init=0.01,model.token_emb_init_std=0.3,model.w_lat_add=0.01,model.window_size=[30,30],model.zero_init_head=true,optimizer.betas=[0.85,0.9],optimizer.eps=1e-8,optimizer.lr=0.0002,optimizer.weight_decay=0.01,optimizer=adamw,trainer.lr_rampup_kimg=20,trainer.total_kimg=25000
    id: ???
    num: ???
    config_name: train
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /lus/flare/projects/Aurora_deployment/vhat/gb25_cli/aeris
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /lus/flare/projects/Aurora_deployment/vhat/gb25_cli/aeris/src/aeris/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /flare/SAFS/vhat/checkpoints/p_1Bd66c
    choices:
      system: ampere
      experiment: era5-vaino
      precond: edm
      loss: edm
      model: swin
      data: era5-aurora
      optimizer: adamw
      trainer: defaults
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
